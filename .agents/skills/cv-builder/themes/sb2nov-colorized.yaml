# Custom sb2nov-colorized theme for rendercv
# Based on sb2nov theme with custom color palette and styling
# Usage: rendercv render cv.yaml --design sb2nov-colorized.yaml

design:
  theme: sb2nov

  # Page settings
  page:
    size: a4
    top_margin: 1.2cm
    bottom_margin: 1.2cm
    left_margin: 1.5cm
    right_margin: 1.5cm
    show_footer: false
    show_top_note: false

  # Color palette: dark indigo shades
  colors:
    body: rgb(30, 27, 75)           # indigo-950 darkest for main text
    name: rgb(30, 27, 75)           # indigo-950 darkest for name
    headline: rgb(49, 46, 129)      # indigo-900 for positions
    connections: rgb(67, 56, 202)    # indigo-700 for contact
    section_titles: rgb(55, 48, 163) # indigo-800 for sections
    links: rgb(49, 46, 129)         # indigo-900 for links

  # Typography
  typography:
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: New Computer Modern
      name: Caveat Brush
      headline: New Computer Modern
      connections: New Computer Modern
      section_titles: New Computer Modern
    font_size:
      body: 10pt
      name: 22pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.3em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true

  # Links
  links:
    underline: true
    show_external_link_icon: false

  # Header
  header:
    alignment: center
    space_below_name: 0.5cm
    space_below_headline: 0.3cm
    space_below_connections: 0.5cm
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    connections:
      phone_number_format: international
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: " • "
      space_between_connections: 0.3cm

  # Section titles
  section_titles:
    type: with_full_line
    line_thickness: 0.8pt
    space_above: 0.6cm
    space_below: 0.3cm

  # Sections
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.5cm
    space_between_text_based_entries: 0.15cm
    show_time_spans_in: []

  # Entries
  entries:
    date_and_location_width: 4cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: false
    summary:
      space_above: 0.1cm
      space_left: 0cm
    highlights:
      bullet: "•"
      nested_bullet: "◦"
      space_left: 0.15cm
      space_above: 0.05cm
      space_between_items: 0.05cm
      space_between_bullet_and_text: 0.5em
