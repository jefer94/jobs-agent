          - "CI/CD con CircleCI; 97 commits, 3 forks adoptados por la comunidad"
          - "Stack: JavaScript, Node.js"

    # ----------------------------------------------------------
    # PUBLICACIONES TÉCNICAS
    # ----------------------------------------------------------
    publicaciones:
      - "**\"GitHub Action para fortalecer spec-first development: bloqueando PRs sin especificación previa\"** — Medium (@jefer.dfp), Mar 2026 · Flujo de 3 etapas: spec PR (bloqueado si no hay specs) → aceptación por maintainer → implementation PR con validación IA que confirma cumplimiento — la implementación pasa a ser consecuencia, no punto de partida"
      - "**\"Como programar más rápido y mejor usando SDD y BDD\"** — Medium (@jefer.dfp), Mar 2026 · SDD (specs primero, implementación como consecuencia) + BDD (casos de prueba como historias de usuario con Gherkin); cómo estructurar especificaciones para afinar contexto de agentes IA y reducir tokens"
      - "**\"Estrategias de desarrollo antiregresivas en la era de los agentes autónomos\"** — Medium (@jefer.dfp), Mar 2026 · PRDs, RFCs, OpenAPI y workflows como mecanismos antiregresivos; segregación de funcionalidades críticas via microservicios o N8N; configuración de workflows en Windsurf/OpenCode para encadenar specs, BDD y TDD"

