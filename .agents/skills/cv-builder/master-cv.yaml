      - "**celery-task-manager** (PyPI, LGPL 3.0) — Plugin Django/Celery para gestión declarativa de tareas: prioridades (NOTIFICATION, etc.), manejo de excepciones AbortTask/RetryTask, validaciones. Instalación: pip install celery-task-manager"
      - "**linked-services** (PyPI, LGPL 3.0) — Comunicación segura entre microservicios con pairwise key authentication (reemplaza algoritmos de firma). Soporte para Django, requests, httpx, aiohttp. Instalación: pip install linked-services[django,requests,aiohttp]"
      - "**@learnpack/learnpack** (npm, v5.0.217) — CLI oclif para crear, publicar y ejecutar paquetes de aprendizaje interactivo. Comandos: audit, translate, test, publish, serve. Instalación: npm install -g @learnpack/learnpack"
      - "**lit-ssr-utils** (npm, TypeScript) — Librería de SSR para Lit Web Components en entornos no-JS: HTTP API con adapter Elysia/Bun que recibe HTML de componente y retorna HTML renderizado server-side; implementación Python complementaria (lit-ssr.py). 17 commits"

